# Controller Summaries
api.crud.tag.name=CRUD API
api.crud.tag.desc=Endpoints for managing sensitive words in the database (Internal Consumption)
api.filtering.tag.name=Filtering API
api.filtering.tag.desc=Endpoints for checking and filtering sensitive words (External Consumption)
api.auth.tag.name=Authentication API
api.auth.tag.desc=Endpoints for user registration and authentication

# Word Controller Annotations
api.words.check.summary=Check and filter text
api.words.check.desc=Checks the input text for any sensitive words in the database and replaces them with stars.
api.words.check.200=Successfully filtered the text
api.words.check.400=Invalid input text provided
api.words.check.401=Unauthorized - Missing or invalid JWT token
api.words.health.summary=Health check
api.words.health.desc=Checks if the API is running.
api.words.health.200=API is up and running

# Sensitive Word Controller Annotations
api.sensitive.create.summary=Create a new sensitive word
api.sensitive.create.desc=Adds a new sensitive word to the database.
api.sensitive.create.200=Successfully created the sensitive word
api.sensitive.create.400=Invalid input data
api.sensitive.create.401=Unauthorized
api.sensitive.get_all_paginated.summary=Get all sensitive words (Paginated)
api.sensitive.get_all_paginated.desc=Returns a paginated list of all sensitive words currently in the database.
api.sensitive.get_all_paginated.200=Successfully retrieved the paginated list
api.sensitive.get_all.summary=Get all sensitive words
api.sensitive.get_all.desc=Returns a list of all sensitive words currently in the database.
api.sensitive.get_all.200=Successfully retrieved all words
api.sensitive.get_by_id.summary=Get sensitive word by ID
api.sensitive.get_by_id.desc=Retrieves a single sensitive word by its unique ID.
api.sensitive.get_by_id.200=Successfully retrieved the sensitive word
api.sensitive.get_by_id.404=Sensitive word not found
api.sensitive.update.summary=Update sensitive word
api.sensitive.update.desc=Updates an existing sensitive word by its ID.
api.sensitive.update.200=Successfully updated the sensitive word
api.sensitive.update.404=Sensitive word not found
api.sensitive.delete.summary=Delete sensitive word
api.sensitive.delete.desc=Removes a sensitive word from the database by its ID.
api.sensitive.delete.204=Successfully deleted the sensitive word

# Auth Controller Annotations
api.auth.register.summary=Register a new user
api.auth.register.desc=Creates a new user account and returns a JWT token.
api.auth.register.200=Successfully registered new user
api.auth.authenticate.summary=Authenticate user
api.auth.authenticate.desc=Validates user credentials and returns a JWT token.
api.auth.authenticate.200=Successfully authenticated user
api.auth.authenticate.401=Invalid username or password
